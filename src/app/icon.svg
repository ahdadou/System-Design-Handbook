<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD600" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <radialGradient id="el" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#FFFDE7" />
      <stop offset="40%" stop-color="#FFD600" />
      <stop offset="100%" stop-color="#B45309" />
    </radialGradient>
    <radialGradient id="er" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#F5F3FF" />
      <stop offset="40%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#5B21B6" />
    </radialGradient>
    <linearGradient id="bd" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="100%" stop-color="#101010" />
    </linearGradient>
    <filter id="gy" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="gp" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="hx" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Hexagonal badge -->
  <polygon points="50,1 95,25.5 95,74.5 50,99 5,74.5 5,25.5" fill="none" stroke="url(#bg)" stroke-width="1" opacity="0.2" filter="url(#hx)" />
  <polygon points="50,4 92,27 92,73 50,96 8,73 8,27" fill="#0c0c0c" stroke="url(#bg)" stroke-width="2.5" />

  <!-- Ear tufts -->
  <polygon points="35,21 27.5,36 42.5,36" fill="#FFD600" />
  <polygon points="35,25 30,36 40,36" fill="#B45309" opacity="0.35" />
  <polygon points="65,21 57.5,36 72.5,36" fill="#A855F7" />
  <polygon points="65,25 60,36 70,36" fill="#5B21B6" opacity="0.35" />

  <!-- Head & body -->
  <circle cx="50" cy="53" r="31" fill="url(#bd)" />
  <ellipse cx="50" cy="52" rx="22" ry="20" fill="none" stroke="#1e1e1e" stroke-width="1.2" />

  <!-- Eye sockets -->
  <circle cx="39" cy="50" r="12.5" fill="#060606" />
  <circle cx="61" cy="50" r="12.5" fill="#060606" />
  <circle cx="39" cy="50" r="12.5" fill="none" stroke="#1c1c1c" stroke-width="1" />
  <circle cx="61" cy="50" r="12.5" fill="none" stroke="#1c1c1c" stroke-width="1" />
  <rect x="44.5" y="42" width="11" height="4" rx="2" fill="#060606" />

  <!-- Irises -->
  <circle cx="39" cy="50" r="9" fill="url(#el)" filter="url(#gy)" />
  <circle cx="61" cy="50" r="9" fill="url(#er)" filter="url(#gp)" />

  <!-- Pupils -->
  <circle cx="39" cy="50" r="4" fill="#030303" />
  <circle cx="61" cy="50" r="4" fill="#030303" />

  <!-- Eye shines -->
  <circle cx="36.2" cy="46.8" r="2.2" fill="rgba(255,255,255,0.7)" />
  <circle cx="58.2" cy="46.8" r="2.2" fill="rgba(255,255,255,0.7)" />
  <circle cx="41.5" cy="53" r="1" fill="rgba(255,255,255,0.3)" />
  <circle cx="63.5" cy="53" r="1" fill="rgba(255,255,255,0.3)" />

  <!-- Beak -->
  <polygon points="50,61 44.5,70 55.5,70" fill="#F59E0B" />
  <line x1="50" y1="61" x2="50" y2="70" stroke="#B45309" stroke-width="1" opacity="0.5" />
  <polygon points="50,61 44.5,70 50,66" fill="#FDE68A" opacity="0.4" />

  <!-- Feather arcs -->
  <path d="M 30 65 Q 40 60 50 65" stroke="#202020" stroke-width="1.5" fill="none" />
  <path d="M 50 65 Q 60 60 70 65" stroke="#202020" stroke-width="1.5" fill="none" />
  <path d="M 32 72 Q 41 67 50 72" stroke="#1c1c1c" stroke-width="1.2" fill="none" />
  <path d="M 50 72 Q 59 67 68 72" stroke="#1c1c1c" stroke-width="1.2" fill="none" />

  <!-- Wings -->
  <path d="M 19 61 Q 9 72 19 86 Q 30 79 31 67" fill="#151515" stroke="#1e1e1e" stroke-width="1.5" />
  <path d="M 21 65 Q 14 73 21 82" stroke="#252525" stroke-width="1" fill="none" />
  <path d="M 81 61 Q 91 72 81 86 Q 70 79 69 67" fill="#151515" stroke="#1e1e1e" stroke-width="1.5" />
  <path d="M 79 65 Q 86 73 79 82" stroke="#252525" stroke-width="1" fill="none" />

  <!-- Circuit traces -->
  <line x1="29" y1="74" x2="42" y2="74" stroke="#FFD600" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
  <circle cx="29" cy="74" r="2.2" fill="#FFD600" opacity="0.7" />
  <line x1="42" y1="74" x2="42" y2="82" stroke="#FFD600" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
  <circle cx="42" cy="82" r="2.2" fill="#FFD600" opacity="0.7" />
  <line x1="71" y1="74" x2="58" y2="74" stroke="#A855F7" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
  <circle cx="71" cy="74" r="2.2" fill="#A855F7" opacity="0.7" />
  <line x1="58" y1="74" x2="58" y2="82" stroke="#A855F7" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
  <circle cx="58" cy="82" r="2.2" fill="#A855F7" opacity="0.7" />
  <line x1="42" y1="82" x2="50" y2="86" stroke="#1f1f1f" stroke-width="1.2" />
  <line x1="58" y1="82" x2="50" y2="86" stroke="#1f1f1f" stroke-width="1.2" />
  <circle cx="50" cy="86" r="2.8" fill="#22C55E" opacity="0.85" />
  <circle cx="50" cy="86" r="1.2" fill="#86EFAC" opacity="0.8" />
</svg>
